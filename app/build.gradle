apply plugin: 'com.android.application'

android {
    namespace 'com.aashumalik.misetarminal'
    compileSdk 28

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    defaultConfig {
        applicationId "com.aashumalik.misetarminal"
        minSdk 24
        targetSdk 28
        versionCode 1
        versionName "0.1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
}
